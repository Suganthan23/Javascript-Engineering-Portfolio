<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="../../ui.css">
    <link rel="stylesheet" href="./app.css">
</head>

<body>

    <div class="container" style="max-width: 1200px;">
        <div class="app">
            <header class="header">
                <div>
                    <h1 class="h1">Kanban Board</h1>
                    <p class="sub">Drag and drop tasks. Click text to edit.</p>
                </div>
                <div class="row">
                    <button id="add-btn" class="btn primary">+ New Task</button>
                    <button id="theme-toggle" class="theme-switch" aria-label="Toggle theme">
                        <span class="switch-icon"></span>
                    </button>
                </div>
            </header>

            <main class="board">
                <div class="column col-todo">
                    <div class="column-header">
                        <span>To Do</span>
                        <span id="count-todo" class="count-badge">0</span>
                    </div>
                    <div class="task-list" id="todo" data-status="todo"></div>
                </div>

                <div class="column col-doing">
                    <div class="column-header">
                        <span>In Progress</span>
                        <span id="count-doing" class="count-badge">0</span>
                    </div>
                    <div class="task-list" id="doing" data-status="doing"></div>
                </div>

                <div class="column col-done">
                    <div class="column-header">
                        <span>Done</span>
                        <span id="count-done" class="count-badge">0</span>
                    </div>
                    <div class="task-list" id="done" data-status="done"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../theme.js" defer></script>
    <script src="script.js" defer></script>
</body>

</html>
