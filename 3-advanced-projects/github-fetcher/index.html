<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Explorer</title>
    <link rel="stylesheet" href="../../ui.css">
    <link rel="stylesheet" href="./app.css">
</head>

<body>

    <div class="container">
        <div class="app">
            <header class="header">
                <div>
                    <h1 class="h1">GitHub Explorer</h1>
                    <p class="sub">Search users and explore repositories</p>
                </div>
                <button id="theme-toggle" class="theme-switch" aria-label="Toggle theme">
                    <span class="switch-icon"></span>
                </button>
            </header>

            <div class="search-area">
                <input id="search" placeholder="Enter GitHub username (e.g. Suganthan23)...">
            </div>

            <div id="loader" class="loader"></div>

            <div id="error" class="card" style="display:none;">
                <h3 style="margin:0;">User Not Found</h3>
            </div>

            <div id="profile" style="display: none;">

                <div class="card" style="text-align: center;">
                    <img id="u-avatar" src="" alt="Avatar" class="avatar">
                    <h2 id="u-name" style="margin: 10px 0 5px;"></h2>
                    <p id="u-bio" style="color: var(--muted); margin-bottom: 20px;"></p>

                    <div class="grid"
                        style="grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 500px; margin: 0 auto;">
                        <div class="stat-box">
                            <div id="u-repos" class="stat-val">0</div>
                            <div class="stat-label">Repos</div>
                        </div>
                        <div class="stat-box">
                            <div id="u-followers" class="stat-val">0</div>
                            <div class="stat-label">Followers</div>
                        </div>
                        <div class="stat-box">
                            <div id="u-following" class="stat-val">0</div>
                            <div class="stat-label">Following</div>
                        </div>
                    </div>

                    <div style="height: 20px;"></div>
                    <a id="u-link" href="#" target="_blank" class="btn primary">View on GitHub</a>
                </div>

                <div style="height: 20px;"></div>

                <h3 style="margin-bottom: 15px;">Latest Repositories</h3>
                <div id="repos" class="repo-grid">
                </div>
            </div>

        </div>
    </div>

    <script src="../../theme.js" defer></script>
    <script src="script.js"></script>
</body>

</html>
