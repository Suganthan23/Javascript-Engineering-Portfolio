<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Gallery</title>
    <link rel="stylesheet" href="../../ui.css">
    <link rel="stylesheet" href="./app.css">
</head>

<body>

    <div class="container" style="max-width: 1400px;">
        <div class="app">
            <header class="header" style="justify-content:space-between; text-align:left;">
                <div>
                    <h1 class="h1">Infinite Gallery</h1>
                    <p class="sub">Powered by Unsplash Source &amp; Intersection Observer</p>
                </div>
                <button id="theme-toggle" class="theme-switch" aria-label="Toggle theme">
                    <span class="switch-icon"></span>
                </button>
            </header>

            <main>
                <div id="gallery" class="gallery"></div>

                <div id="sentinel" class="sentinel">
                    <div class="loader"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../theme.js" defer></script>
    <script src="script.js" defer></script>
</body>

</html>
